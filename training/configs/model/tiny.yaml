base_model_type: "custom_transformer"  # options: custom_transformer, gemma, etc.
config_name: "gpt2"  # Base config to start from
num_hidden_layers: 1
num_attention_heads: 1
hidden_size: 32
intermediate_size: 128  # 4x hidden size for feed-forward
max_position_embeddings: 128
hidden_dropout_prob: 0.1
attention_probs_dropout_prob: 0.1
output_dir: "outputs/${project_name}/${experiment_name}"
